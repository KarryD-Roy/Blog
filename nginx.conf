# ----------------------------------------------------------------------
# ⚠️ 启动说明 / Important Note ⚠️
# 1. 请先确保此时没有其他 nginx 进程在运行（可使用命令：taskkill /F /IM nginx.exe）
# 2. 必须显式指定加载此配置文件，否则 Nginx 会加载默认配置！
#    请打开 CMD，进入 Nginx 安装目录，运行以下命令（路径根据实际情况调整）：
#    nginx.exe -c "C:/Users/Karry/Desktop/Trae01/Blog/nginx.conf"
# 3. 如果你的 Nginx 安装在 C 盘受保护目录，可能需要管理员权限。
# ----------------------------------------------------------------------

worker_processes  1;

# 必须设置 error_log 的绝对路径，否则 nginx 在启动前就会去当前目录找 logs 而报错
error_log  C:/develop/nginx-1.26.2/logs/error.log;
pid        C:/develop/nginx-1.26.2/logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       C:/develop/nginx-1.26.2/conf/mime.types;
    default_type  application/octet-stream;
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  C:/develop/nginx-1.26.2/logs/access.log  main;
    error_log   C:/develop/nginx-1.26.2/logs/error.log;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost;

        # --- 前端配置 (静态资源) ---
        location / {
            # 这里指向前端 npm run build 生成的 dist 目录的绝对路径
            # Windows 系统中路径分隔符建议使用正斜杠 /
            root   C:/Users/Karry/Desktop/Trae01/Blog/frontend/dist;

            index  index.html index.htm;

            # 重要：解决 Vue History 模式下刷新页面 404 的问题
            # 如果找不到对应文件，强制回退到 index.html 让 Vue 路由处理
            try_files $uri $uri/ /index.html;
        }

        # --- 后端配置 (API 反向代理) ---
        location /api/ {
            # 将以 /api 开头的请求转发给本地 Spring Boot 服务 (默认8080)
            proxy_pass http://127.0.0.1:8080;

            # 传递原始请求头信息，防止后端获取不到客户端真实 IP
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 增加超时时间设置，防止上传大文件时超时 (可选)
            proxy_connect_timeout 600;
            proxy_read_timeout 600;
        }
    }
}

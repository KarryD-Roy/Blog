version: "3.8"

# =====================================================================
# Blog 全栈容器化部署 - Docker Compose
# 目标主机: 192.168.152.128
# 使用方式: docker compose up -d --build
# =====================================================================

services:
  # --- MySQL 数据库 ---
  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: blog_db
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - blog-network

  # --- Redis 缓存 ---
  redis:
    image: redis:7.2
    container_name: blog-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blog-network

  # --- RabbitMQ 消息队列 ---
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: blog-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"       # AMQP 协议端口
      - "15672:15672"     # 管理面板端口
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - blog-network

  # --- Elasticsearch 全文检索 ---
  elasticsearch:
    image: elasticsearch:8.12.2
    container_name: blog-es
    restart: unless-stopped
    ports:
      - "9201:9200"
      - "9301:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - network.host=0.0.0.0
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -o /dev/null http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - blog-network

  # --- AI 服务 (Python FastAPI) ---
  ai-service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: blog-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - CHROMA_DB_PATH=/app/chroma_db
      - CHROMA_COLLECTION=blog_posts
    volumes:
      - chroma-data:/app/chroma_db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - blog-network

  # --- 后端 Spring Boot ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blog-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # 数据库 - 容器名方式通信
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/blog_db?useUnicode=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      # Redis
      - SPRING_DATA_REDIS_HOST=redis
      # RabbitMQ
      - SPRING_RABBITMQ_HOST=rabbitmq
      # AI 服务地址
      - AI_SERVICE_URL=http://ai-service:8000/api/ai
      # JWT
      - JWT_SECRET=${JWT_SECRET}
      # 阿里云 OSS（从 .env 注入）
      - ALIYUN_OSS_ACCESS_KEY_ID=${ALIYUN_OSS_ACCESS_KEY_ID}
      - ALIYUN_OSS_ACCESS_KEY_SECRET=${ALIYUN_OSS_ACCESS_KEY_SECRET}
      # ES（默认关闭）
      - SEARCH_ELASTICSEARCH_ENABLED=${SEARCH_ELASTICSEARCH_ENABLED:-false}
      - SEARCH_ELASTICSEARCH_URIS=http://elasticsearch:9200
      # 日志级别保留 debug
      - LOGGING_LEVEL_COM_EXAMPLE_BLOG=debug
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - blog-network

  # --- 前端 (Nginx 静态资源 + API 反向代理) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blog-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - blog-network

# ========== 持久化卷 ==========
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local
  es-data:
    driver: local
  chroma-data:
    driver: local

# ========== 网络 ==========
networks:
  blog-network:
    driver: bridge
